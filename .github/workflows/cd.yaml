name: "CD - Prospectio Front"

on:
  pull_request:
    types: [closed]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-push:
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
      || (github.event_name == 'issue_comment'
          && github.event.issue.pull_request
          && contains(github.event.comment.body, '/deploy'))
    runs-on: ubuntu-latest

    steps:
      # ── 1. Resolve the SHA to deploy ──────────────────────────────
      - name: Get deploy SHA
        id: sha
        uses: actions/github-script@v7
        with:
          script: |
            let sha;
            if (context.eventName === 'pull_request') {
              sha = context.payload.pull_request.merge_commit_sha;
            } else {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.issue.number,
              });
              sha = pr.data.merge_commit_sha || pr.data.head.sha;
            }
            core.setOutput('sha', sha);
            core.info(`Deploy SHA: ${sha}`);

      # ── 2. Acknowledge /deploy with a rocket reaction ─────────────
      - name: Add rocket reaction
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      # ── 3. Checkout at resolved SHA ───────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}

      # ── 4. Setup Docker Buildx ────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Login to DockerHub ─────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 6. Build for scanning (amd64 only) ────────────────────────
      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: kaiohz/prospectio-front:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Trivy Image Scan – report (CRITICAL + HIGH + MEDIUM) ──
      - name: Trivy Image Scan report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: kaiohz/prospectio-front:scan
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"
          trivy-config: trivy.yaml

      # ── 8. Trivy Image Scan – gate (CRITICAL = fail) ──────────────
      - name: Trivy Image Scan gate
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: kaiohz/prospectio-front:scan
          format: table
          severity: CRITICAL
          exit-code: "1"

      # ── 9. Build and push multi-platform ──────────────────────────
      - name: Build and push Docker image (multi-platform)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            kaiohz/prospectio-front:${{ steps.sha.outputs.sha }}
            kaiohz/prospectio-front:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 10. Clone Flux repo ────────────────────────────────────────
      - name: Clone Flux repo
        run: |
          git clone https://x-access-token:${{ secrets.FLUX_REPO_TOKEN }}@github.com/prospectio-ai/flux-repo.git flux-repo

      # ── 11. Update deployment image tag ────────────────────────────
      - name: Update deployment
        run: |
          DEPLOYMENT_FILE="flux-repo/dev/prospectio/prospectio-front/deployment.yaml"
          if [ -f "$DEPLOYMENT_FILE" ]; then
            sed -i "s|image: kaiohz/prospectio-front:.*|image: kaiohz/prospectio-front:${{ steps.sha.outputs.sha }}|" "$DEPLOYMENT_FILE"
          else
            echo "::error::Deployment file not found: $DEPLOYMENT_FILE"
            exit 1
          fi

      # ── 12. Commit and push to Flux repo ───────────────────────────
      - name: Commit and push to Flux repo
        run: |
          cd flux-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev/prospectio/prospectio-front/deployment.yaml
          git commit -m "deploy: prospectio-front ${{ steps.sha.outputs.sha }}"
          git push
